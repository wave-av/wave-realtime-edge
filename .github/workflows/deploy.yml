name: deploy

# wave-realtime-edge deploy (#30). workflow_dispatch ONLY — never auto-deploy on push.
# Merges to main do NOT deploy; Jake names the crossing explicitly (proven-live-or-not-done +
# every-product-host-on-chassis: rt.wave.online is a paid customer-facing host). Mirrors the
# established sibling pattern (wave-acuity-edge/.github/workflows/deploy.yml).
#
# What this does:
#   1. .npmrc + npm ci || npm install   (#258 added the private @wave-av/spoke-chassis dep, so this
#      needs GitHub Packages auth — packages:read + NODE_AUTH_TOKEN + .npmrc, mirroring contract-tests.yml)
#   2. typecheck + test (re-run the gate before a real deploy)
#   3. wrangler deploy
#      wrangler reads wrangler.toml: name, main, routes (rt.wave.online custom_domain), the Durable Object
#      bindings + migrations — ROOM/v1, RECORDER, and AGENT_SESSION (voice-agent runtime, migration v3,
#      new_sqlite_classes ["AgentSessionDO"]) — vars, and observability. First deploy bootstraps the migrations.
#
# Secrets required in this repo (set once, NOT here — same org secrets the other spokes use):
#   CLOUDFLARE_API_TOKEN   — CF API token: Workers Scripts:Edit, Workers KV:Edit, Zone Workers Routes:Edit
#   CLOUDFLARE_ACCOUNT_ID  — the WAVE CF account id
#
# Worker runtime secrets are NOT set here — and NOT from this PUBLIC repo's CI (GitHub won't expose the org
# DOPPLER_TOKEN to a public repo, and prod creds must never live here). Provision them from the PRIVATE
# foundation hub: run wave-av/wave-foundation `provision-worker-secrets.yml` (workflow_dispatch) with
# worker=wave-realtime-edge and secret_names="WAVE_SERVICE_TOKEN ELEVENLABS_API_KEY ELEVENLABS_VOICE_ID
# CF_CALLS_APP_ID CF_CALLS_APP_SECRET" — values flow Doppler -> foundation CI -> Cloudflare. They include:
#   CF_CALLS_APP_ID, CF_CALLS_APP_SECRET   — CF Realtime SFU app creds (sfu.ts)
#   WAVE_SERVICE_TOKEN                     — gateway bearer: metering tap (room.ts) AND, via
#                                            normalizeGatewayEnv, the voice-agent LLM/STT/tools paths
#   ELEVENLABS_API_KEY, ELEVENLABS_VOICE_ID — voice-agent TTS (agent-turn.ts), behind VOICE_AGENT_PROVIDER
#   WAVE_INTERNAL_SECRET, CF_API_TOKEN, TURN_KEY_ID, TURN_KEY_TOKEN — existing /rtk surface (worker.ts)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "which env to deploy (production = rt.wave.online; canary = wave-realtime-edge-canary on workers.dev)"
        type: choice
        options:
          - production
          - canary
        default: production

permissions:
  contents: read
  packages: read # @wave-av/spoke-chassis is a private GitHub Packages dep (added in #258)

concurrency:
  group: deploy-wave-realtime-edge
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      # #258 added @wave-av/spoke-chassis (private scope). Without a .npmrc pointing the @wave-av scope at
      # GitHub Packages with a read token, `npm ci` 401s and the deploy never runs. Mirrors the proven
      # pattern in contract-tests.yml / governance-enforce.yml. NODE_AUTH_TOKEN is substituted by npm at read time.
      - name: Authenticate to GitHub Packages for the @wave-av scope
        run: printf '@wave-av:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}\n' > .npmrc

      - name: install
        run: npm ci || npm install

      - name: typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: test (vitest)
        run: npm test

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # production → default worker (wrangler.toml top-level: name=wave-realtime-edge, rt.wave.online
          # custom_domain, ROOM/RECORDER/AGENT_SESSION DOs). canary → the [env.canary] worker
          # (wave-realtime-edge-canary, workers_dev, routes=[] so it CANNOT inherit/steal the prod custom
          # domain, RT_ENCODER=container + AV1_DEFAULT + NEGOTIATION_ENABLED for the #138 recorder proof).
          # `environment` is a restricted choice input (production|canary) — no injection surface.
          command: ${{ inputs.environment == 'canary' && 'deploy --env canary' || 'deploy' }}
