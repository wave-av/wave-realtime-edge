name: sync-secrets

# wave-realtime-edge — provision the Worker RUNTIME secrets on a wrangler-capable node (#81 voice-agent
# runtime). workflow_dispatch ONLY. studio-cc (the historical manual node) is fragile/offline, so this makes
# the capable-node path PERMANENT + reproducible (deploy-on-wrangler-capable-node): values are pulled from
# Doppler wave/prd at runtime, streamed straight into `wrangler secret put` via stdin, and NEVER written to
# disk, the log, or a file. This sets secrets only — it does NOT deploy (run deploy.yml after).
#
# Mirrors the org Doppler-in-CI convention (wave-foundation/obs-wire.yml): the only secret this repo needs is
# the org DOPPLER_TOKEN (PRIVATE-visibility org secret, already available); CLOUDFLARE_API_TOKEN /
# CLOUDFLARE_ACCOUNT_ID are the same org secrets the deploy uses.
#
# WHAT IT PROVISIONS (worker secret  <-  Doppler wave/prd name):
#   WAVE_SERVICE_TOKEN   <- WAVE_SERVICE_TOKEN   # gateway service bearer. Drives metering AND (via
#                                                #   normalizeGatewayEnv) the LLM/STT/tools paths.
#   ELEVENLABS_API_KEY   <- ELEVENLABS_API_KEY   # TTS key (server-side only).
#   ELEVENLABS_VOICE_ID  <- ELEVENLABS_VOICE_ID  # agent persona voice.
#   CF_CALLS_APP_ID      <- CF_CALLS_APP_ID       # CF Realtime SFU (idempotent; usually already set).
#   CF_CALLS_APP_SECRET  <- CF_CALLS_APP_SECRET   # CF Realtime SFU app secret.
# NOTE: GATEWAY_BASE_URL is a [vars] entry in wrangler.toml (public origin) — NOT set here (a name defined as
# both var and secret collides). normalizeGatewayEnv resolves WAVE_GATEWAY_BASE from that var.

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-secrets-wave-realtime-edge
  cancel-in-progress: false

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: install
        run: npm ci || npm install

      - uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73 # v4.0.1

      - name: put worker secrets (Doppler -> stdin -> wrangler; never to disk/log)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # WORKER_SECRET=DOPPLER_NAME — stream each value through a pipe; no `set -x`, no echoing of values.
          while IFS='=' read -r worker doppler; do
            [ -z "$worker" ] && continue
            echo "::group::wrangler secret put ${worker}  (from Doppler ${doppler})"
            doppler secrets get "${doppler}" --plain --project wave --config prd \
              | npx wrangler secret put "${worker}"
            echo "::endgroup::"
          done <<'MAP'
          WAVE_SERVICE_TOKEN=WAVE_SERVICE_TOKEN
          ELEVENLABS_API_KEY=ELEVENLABS_API_KEY
          ELEVENLABS_VOICE_ID=ELEVENLABS_VOICE_ID
          CF_CALLS_APP_ID=CF_CALLS_APP_ID
          CF_CALLS_APP_SECRET=CF_CALLS_APP_SECRET
          MAP

      - name: receipt — list secret NAMES on the worker (names only, never values)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler secret list
