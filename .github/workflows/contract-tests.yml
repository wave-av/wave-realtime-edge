name: contract-tests

# Runs the worker contract test suite on every PR and on pushes to master/staging.
# Tests import the fetch handler directly (no network, no Cloudflare runtime needed)
# so the job is hermetic and fast.

on:
  pull_request:
  push:
    branches: [main, master, staging]

permissions:
  contents: read

jobs:
  test:
    name: Worker contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run contract tests
        run: npm test
