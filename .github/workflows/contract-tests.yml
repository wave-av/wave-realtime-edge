name: contract-tests

# Runs the worker contract test suite on every PR and on pushes to master/staging.
# Tests import the fetch handler directly (no network, no Cloudflare runtime needed)
# so the job is hermetic and fast.

on:
  pull_request:
  push:
    branches: [main, master, staging]

permissions:
  contents: read
  packages: read # @wave-av/spoke-chassis is a private GitHub Packages dep (added in #258)

jobs:
  test:
    name: Worker contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      # #258 added @wave-av/spoke-chassis (private scope). Without a .npmrc pointing the @wave-av scope at
      # GitHub Packages with a read token, `npm ci` 401s and this whole test gate silently stopped running.
      # Mirrors the proven pattern in governance-enforce.yml. NODE_AUTH_TOKEN is substituted by npm at read time.
      - name: Authenticate to GitHub Packages for the @wave-av scope
        run: printf '@wave-av:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}\n' > .npmrc

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run contract tests
        run: npm test
