name = "wave-realtime-edge"
main = "src/worker.ts"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]
# Customer-facing realtime surface; never serve a workers.dev fallback for a paid host (siblings: false).
workers_dev = false

# CF-3 ‚Äî customer-facing realtime surface (url-naming convention: <proto>.wave.online).
# ROUTES PLACEMENT LAW (config-no-silent-noop): `routes` MUST be a top-level key BEFORE any [table]
# header (e.g. before [vars]/[observability]/[[migrations]]). A `routes` key after a [table] is
# silently ignored ("Unexpected fields‚Ä¶routes") and the custom domain never attaches.
# Safe to route directly: /rtk/join and /rtk/turn are internal-secret-gated (401 without the gateway
# header); /health is public. The PAID public path is api.wave.online (gateway charges, then forwards).
# DO NOT attach/deploy this without Jake's named crossing (every-product-host-on-chassis law). After
# first deploy, audit for a stale Worker Route (rt.wave.online/*) that would shadow this custom_domain.
routes = [{ pattern = "rt.wave.online", custom_domain = true }]

[observability]
enabled = true

# RT-P2.5 ‚Äî cron that runs scheduled() ‚Üí reconcilePending: re-pulls any PULL-mode recording whose UPLOADED
# webhook pull failed POST-ack (RTK won't re-deliver after our 200), so a transient blip can't silently lose a
# customer recording. Idempotent (deterministic R2 key); clears the pending KV record on success. Cheap (KV
# list of a normally-empty set). No-op when RT_RECORDINGS/RT_MEETING_ORG are unbound.
[triggers]
crons = ["*/15 * * * *"]

[vars]
# CF-3.1.2 ‚Äî RealtimeKit (CF Realtime) config. RTK_APP_ID is a non-secret app identifier.
RTK_APP_ID = "6dee33e5-cd89-41e8-a81c-9a8cd48bb9c3"
# CF_ACCOUNT_ID is injected at deploy (CI var or `wrangler deploy --var CF_ACCOUNT_ID:<id>`),
# kept out of source per the account-id scrub policy (CF-0 D1).
# CF_API_TOKEN is a SECRET ‚Äî `wrangler secret put CF_API_TOKEN` (account API token w/ Calls/Realtime
# scope). Never commit it; the worker returns ONLY the per-participant join token, never this token.
#
# CF-3 TURN (/rtk/turn) ‚Äî BOTH are wrangler SECRETS (kept out of this public repo + persist across
# deploys, avoiding the CF_ACCOUNT_ID --var footgun). `wrangler secret put`:
#   TURN_KEY_ID     ‚Äî the CF TURN key uid (32-hex). Identifier, not a credential on its own.
#   TURN_KEY_TOKEN  ‚Äî the TURN key's api token (created via POST /accounts/{acc}/calls/turn_keys, shown
#                     once). The worker returns ONLY the ephemeral ICE username/credential, never this token.
# Unset ‚Üí /rtk/turn fails closed (503 REALTIME_NOT_CONFIGURED).

# GATEWAY_BASE_URL ‚Äî the WAVE gateway origin the metering tap reports usage to (public, non-secret).
# = https://api.wave.online. (sfu.ts/room.ts are P5 substrate; the metering tap reads this when wired.)
GATEWAY_BASE_URL = "https://api.wave.online"

# ‚îÄ‚îÄ E3.P2/P4 (#127) DATA-RESIDENCY arm flag. DEFAULT OFF / FULLY INERT. ‚îÄ‚îÄ
# Absent/"0"/"false" -> the recorder is BYTE-IDENTICAL to today: every recording lands in RT_RECORDINGS at the
# non-region key with NO gateway register() call (buildPullSink attaches no residency deps). Set RT_RESIDENCY="1"
# to ARM: an NA session (request.cf.continent NA -> zone us-east) lands in RT_RECORDINGS_ENAM and an EU session
# (EU -> eu-west) in RT_RECORDINGS_EU, each at `${org}/realtime-recordings/${zone}/${meetingId}/recording.<ext>`,
# then is POSTed to the gateway `${WAVE_GATEWAY_ORIGIN||GATEWAY_BASE_URL}/v1/internal/recordings/register` with
# WAVE_SERVICE_TOKEN (residency enforcement). Other continents fall back to the default RT_RECORDINGS path (no
# zone invented). Flipping RT_RESIDENCY in any live env is a Jake-named ‚óÜ crossing (multi-region storage go-live).
# WAVE_GATEWAY_ORIGIN is OPTIONAL (defaults to GATEWAY_BASE_URL above); WAVE_SERVICE_TOKEN is the EXISTING
# wrangler SECRET the metering tap already uses (no new secret).
RT_RESIDENCY = "1"   # ARMED 2026-06-28 ‚Äî #127 ‚óÜ crossing (Jake-named, full-arc). WAVE is the dogfood customer.

# ‚îÄ‚îÄ B3 (#98) ‚Äî IETF WHIP v1 ingest surface (/v1/whip/*). DEFAULT OFF / INERT. ‚îÄ‚îÄ
# WHIP_INGEST_ENABLED gates the whole /v1/whip/{publish,resource/{id}} listener (src/whip.ts). Absent/"0" ‚Üí
# the surface is inert: a /v1/whip/* request falls through to the honest 501 catch-all (worker.ts), exactly
# as before this builder. ARMED "1" (#77 go-live, Jake-authorized 2026-06-24). Preconditions MET:
#   ‚Ä¢ gateway WHIP_EDGE=https://rt.wave.online is set ‚Äî POST /v1/whip/publish with a real whip:write key proved
#     the 503‚Üí501 transition (gateway auth‚Üíscope‚Üíforward all green; only this flag gates the listener);
#   ‚Ä¢ the x-wave-internal seal is the LIVE realtime secret (this worker's WAVE_INTERNAL_SECRET == gateway
#     WAVE_REALTIME_INTERNAL_SECRET, already proven by realtime forwarding) ‚Äî no new secret;
#   ‚Ä¢ metering is counts-but-bills-$0 until STRIPE_PRICE_WHIP_INGEST_MIN is bound (money ‚óÜ, bill-from-launch).
# SAFE rollout: ingest REQUIRES the whip:write scope, which NO customer key holds yet (only WAVE test keys), so
# enabling customers stays a deliberate per-key scope-grant ‚Äî flipping this exposes nothing broken to customers.
WHIP_INGEST_ENABLED = "1"

# ‚îÄ‚îÄ #53 ‚Äî IETF WHEP v1 egress surface (/v1/whep/*). DEFAULT OFF / INERT. ‚îÄ‚îÄ
# WHEP_EGRESS_ENABLED gates the whole /v1/whep/{subscribe,resource/{id}} listener (src/whep.ts) ‚Äî the egress
# SIBLING of WHIP above. Absent/"0" ‚Üí the surface is inert: a /v1/whep/* request falls through to the honest
# 501 catch-all (worker.ts), UNCHANGED. Flipping this to "1" on a live env is a Jake-named ‚óÜ crossing (NEW
# LIVE EGRESS path activation ‚Äî docs/whep-v1-frozen-contract.md ¬ß6/¬ß7) and is the ORCHESTRATOR's deploy, not
# this builder's: when armed, an unauthenticated /v1/whep/subscribe probe is 401 (gateway-trust), not 501.
# Preconditions for go-live: gateway /v1/whep/* forward mapping + whep:read scope + STRIPE_PRICE_WHEP_EGRESS_MIN
# binding (orphan meter blocks GA). Reuses the EXISTING x-wave-internal realtime seal + RT_MEETING_ORG KV.
# Default OFF until that ‚óÜ.
WHEP_EGRESS_ENABLED = "1"   # ‚óÜ ARMED 2026-07-01 (Jake-named: "activate the WHEP egress transport live end-to-end")
# Source = Cloudflare Stream WebRTC playback (one-shot WHEP). USE_CLOUDFLARE_STREAM is the backend gate ‚Äî
# absent/"0" ‚Üí /v1/whep/subscribe fails closed 503 (in addition to the WHEP_EGRESS_ENABLED surface gate above).
# The playback URL is resolved from `wrangler secret put` SECRETS (NEVER in this file): WHEP_SRC_URL_TEMPLATE
# (Stream playback URL with a `{uid}` placeholder; the customer code is baked in, NO token in the URL), or
# built from CF_STREAM_CUSTOMER_CODE. CF_STREAM_API_TOKEN is reserved for Stream-API source resolution. Org
# isolation reuses the `stream-input-org:{uid}` KV map (src/stream-bridge.ts).
USE_CLOUDFLARE_STREAM = "1"  # ‚óÜ ARMED 2026-07-01 ‚Äî CF Stream WebRTC playback backend live

# ‚îÄ‚îÄ B1 (#91-a) ‚Äî CF Stream Live ‚Üí SFU bridge control plane (POST /v1/stream/bridge/webhook). DEFAULT OFF. ‚îÄ‚îÄ
# STREAM_BRIDGE_ENABLED gates the self-authenticating CF Stream webhook receiver (src/stream-bridge.ts). Absent/
# "0" ‚Üí the route falls through to the honest 501 catch-all, UNCHANGED ‚Äî the whole bridge is inert. The webhook
# is HMAC-verified against WAVE_STREAM_WEBHOOK_SECRET (a wrangler SECRET ‚Äî `wrangler secret put`, set at ‚óÜ
# go-live when the CF Stream webhook subscription is created). The republisher container (B2) binding below
# is now UNCOMMENTED (B2 landed) ‚Äî but a /start still fails CLOSED until the bridge wk_ key + CF Stream webhook
# secret are provisioned, so arming the receiver exposes nothing broken.
# ‚óÜ ARMED "1" (#48 go-live, Jake-named 2026-06-26).
STREAM_BRIDGE_ENABLED = "1"

# ‚îÄ‚îÄ #82/#114 CASCADE multi-region relay (RT_CASCADE). INERT by default. ‚îÄ‚îÄ
# Absent/"0"/"false" ‚Üí the realtime room path is byte-identical to today: a join routes to the PRIMARY Room
# DO `idFromName(org:room)` with NO locationHint and NO regional relay. Set RT_CASCADE="1" ‚Üí a regional join
# is placed on its nearest-HEALTHY region's relay DO (a strict-suffix `org:room:region` key) via
# ROOM.get(id,{locationHint}); resolver = src/cascade.ts (PURE), glue = src/cascade-sink.ts. Each per-region
# relay/recorder spawn is a Jake-named ‚óÜ crossing (cascade ADR ¬ß‚óÜ) ‚Äî NOT a blanket global flip.
# RT_CASCADE = "1"

# ‚îÄ‚îÄ Task #81 (LK-rip Phase 6b) ‚Äî Voice-Agent runtime provider flag. DEFAULT OFF / FULLY INERT. ‚îÄ‚îÄ
# Absent/anything-but-"wave" ‚Üí the /v1/realtime/agents/* dispatch + egress routes are skipped entirely
# (voiceAgentEnabled(env)=false) and a request falls through to the honest 501 catch-all ‚Äî UNCHANGED. Setting
# VOICE_AGENT_PROVIDER="wave" arms the routes + the AgentSessionDO; that flip in any live env is a ‚óÜ Jake-named
# crossing (design ¬ßL3 build order step 8).
# ‚óÜ ARMED 2026-06-25 (Jake-named GA cutover, #81): voice-agent routes + AgentSessionDO live. Routes only
# activate on an explicit agent bind (POST /v1/realtime/agents/bind); live rooms are unaffected until bound.
VOICE_AGENT_PROVIDER = "wave"

# ‚îÄ‚îÄ #81 step-4 barge-in ‚Äî TTS real-time send-ahead LEAD (ms). speak() paces the reply to the playout clock so
# the agent the LISTENER hears is interruptible: turnInFlight spans playout (bargeIn fires mid-reply) and on
# abort only ‚â§lead drains. Default in code is 150 (audio-safe); TUNED to 30 here from a live leg4 sweep
# (2026-06-26): 150ms‚Üí~1100ms end-to-end barge stop, 40ms‚Üí~540ms, 20ms‚Üí~104-147ms; 30 keeps barge-in well under
# the 300ms target with a small anti-underrun cushion above 20. 0 disables pacing (legacy bulk send).
AGENT_TTS_LEAD_MS = "30"

# ‚îÄ‚îÄ RT-P1.5 ‚Äî pluggable recording encoders (design ¬ß6). DEFAULT DISARMED / DORMANT. ‚îÄ‚îÄ
# RT_RECORD arms recording at all; absent/"0" ‚Üí selectEncoder() returns the inert DisarmedEncoder (begin ‚Üí
# null), so the whole feature is a no-op (config-no-silent-noop: inert, not silently broken). Arming
# RT_RECORD=1 in any live env is a ‚óÜ Jake-named crossing (design ¬ß8.5(6)).
# ‚óÜ ARMED at RT-P2.4 (#34, Jake-named): managed (C) recording is live in PULL mode. RealtimeKit CANNOT upload
# into R2 (its storage_config enum is aws|azure|digitalocean|gcs|sftp ‚Äî no R2 option; type:"cloudflare" is
# silently dropped ‚Üí recording lands in RTK's OWN bucket, breaking our org-prefix sweep). So RTK records to
# its own storage and the recording.statusUpdate UPLOADED webhook PULLS the finished file into RT_RECORDINGS
# at an org-rooted key (the daily storage sweep bills by org-prefix). CF_API_TOKEN/CF_ACCOUNT_ID are wrangler
# SECRETS. The retired direct-mode S3 creds (RT_R2_ACCESS_KEY_ID/SECRET) have been DELETED from the worker
# + Doppler and their bucket-scoped R2 token (wave-realtime-recordings-rtk-rw) REVOKED (#70) ‚Äî pull mode
# writes via the RT_RECORDINGS R2 binding, never S3 creds, so nothing references them.
RT_RECORD = "1"
# RT_ENCODER selects the adapter when armed: "managed" (C, the buildable path) | "container" (A) | "wasm"
# (B). A/B are BLOCKED-ON-RT-P0.1-spike and throw NOT_SPIKED at begin until the ¬ß7 WS media-transport spike.
RT_ENCODER = "managed"
# (PULL mode hands RTK NO storage_config, so there is no RT_RECORDINGS_BUCKET var ‚Äî the bucket is bound
# directly below as the R2 binding the webhook pull writes into.)

# ‚îÄ‚îÄ RT-P2.5 ‚Äî the SKIP sink R2 bucket (RT_RECORDINGS) + the meetingId‚Üíorg map (RT_MEETING_ORG). ‚îÄ‚îÄ
# The recording webhook fetches the finished RTK recording and streams it into RT_RECORDINGS at
# `${org}/realtime-recordings/${meetingId}/recording.<ext>`; RT_MEETING_ORG carries org from the stateless
# /rtk/join to that later webhook so the pull can attribute it. tier=SKIP (no dedup index is ever touched).
[[r2_buckets]]
binding = "RT_RECORDINGS"
bucket_name = "wave-realtime-recordings"

# ‚îÄ‚îÄ E3.P2/P4 (#127) DATA-RESIDENCY jurisdiction buckets. BOUND but only USED when RT_RESIDENCY is on. ‚îÄ‚îÄ
# These two buckets ALREADY EXIST and are the SAME residency-correct buckets the gateway enforces against
# (gateway RESIDENCY_BUCKETS="enam=wave-recordings-enam,eu=wave-recordings-eu"). Bound here so the residency
# pull can write an NA session's bytes into wave-recordings-enam (zone us-east -> jurisdiction enam) and an EU
# session's into wave-recordings-eu (zone eu-west -> jurisdiction eu). With RT_RESIDENCY ABSENT/"0" (default),
# buildResidencyDeps() is never attached -> these bindings are NEVER read -> every recording still lands in
# RT_RECORDINGS exactly as today. Binding present + inert until RT_RESIDENCY is named (Jake-named ‚óÜ).
[[r2_buckets]]
binding = "RT_RECORDINGS_ENAM"
bucket_name = "wave-recordings-enam"

[[r2_buckets]]
binding = "RT_RECORDINGS_EU"
bucket_name = "wave-recordings-eu"
# EU DATA-RESIDENCY: this bucket lives in CF R2's EU jurisdiction namespace (location EEUR), so the binding
# MUST declare jurisdiction = "eu" ‚Äî without it the binding resolves to the default (non-EU) namespace and an
# EU session's bytes would NOT be residency-correct. (#127 ‚óÜ Jake-named EU-residency crossing, 2026-06-28.)
jurisdiction = "eu"

[[kv_namespaces]]
binding = "RT_MEETING_ORG"
id = "4acd6ec7b04546ba8767f2353d5394e8"   # `wrangler kv namespace create RT_MEETING_ORG` (d674452f acct)

# ‚îÄ‚îÄ CF Realtime SFU app creds (P5 ‚Äî sfu.ts) ‚Äî wrangler SECRETS, referenced not valued ‚îÄ‚îÄ
# These are NOT set here. Set via `wrangler secret put`, values from Doppler wave/prd:
#   CF_CALLS_APP_ID      ‚Äî CF Realtime app id (app "wispy-feather-fa96"). sfu.ts SfuClient appId.
#   CF_CALLS_APP_SECRET  ‚Äî the app secret (Bearer to rtc.live.cloudflare.com). Never logged/returned.
# Unset ‚Üí SfuClient fails closed (503 REALTIME_NOT_CONFIGURED), preserving the current /rtk surface.
#
# ‚îÄ‚îÄ Metering tap (room.ts ‚Üí gateway) ‚Äî wrangler SECRET ‚îÄ‚îÄ
#   WAVE_SERVICE_TOKEN   ‚Äî bearer the metering tap presents to the gateway /v1/internal/usage path.
#                          `wrangler secret put WAVE_SERVICE_TOKEN` (Doppler wave/prd). Unset ‚Üí no emit.

# ‚îÄ‚îÄ Room Durable Object (room.ts RoomDO) ‚Äî per-room state (participants, track registry, TTL) ‚îÄ‚îÄ
# RoomDO is exported from src/worker.ts (the main module) so this binding + migration resolve on the
# first deploy. SQLite-backed DO (new_sqlite_classes) per the storage-governed default.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# ‚îÄ‚îÄ RT-R10 (#72) ‚Äî PORTABLE raw-SFU encode container (Path A). ARMED (Step A) = infra deployed, encoder dormant. ‚îÄ‚îÄ
# The rt-encoder image (containers/rt-encoder/) transcodes JPEG‚ÜíVP8 / PCM‚ÜíOpus for the raw-SFU recorder ‚Äî work
# the Workers isolate can't host (no libvpx/libopus). The class RecorderContainer is exported from src/worker.ts
# (mirrors bridge-edge's MoqContainer). Step A (#67b, Jake-named ‚óÜ A) UNCOMMENTS these three blocks so the
# container DO is provisioned on the deploying account (d674452f has CF Containers ‚Äî wave-bridge-edge-moqcontainer
# runs live) AND the image is built/pushed by the deploy pipeline. The encoder STAYS dormant: RT_ENCODER remains
# "managed" (the live PULL-mode path) and RECORDER_TARGET is unset (defaults 'none' ‚Üí
# src/encoders/recorder-target.ts NoneTarget), so the RecorderContainer infra is armed but never invoked. The
# encoder flip to RECORDER_TARGET="cf" is Step D (separate Jake-named ‚óÜ).
[[containers]]
class_name = "RecorderContainer"
image = "./containers/rt-encoder/Dockerfile"
max_instances = 3

[[durable_objects.bindings]]
name = "RECORDER"
class_name = "RecorderContainer"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RecorderContainer"]

# ‚îÄ‚îÄ B1/B2 (#91) ‚Äî CF Stream ‚Üí SFU bridge republisher container (StreamBridgeContainer, MODE=whep-to-whip). ‚îÄ‚îÄ
# ‚óÜ ARMED at go-live (#48, Jake-named 2026-06-26): B2 landed (PR #104 ‚Äî containers/stream-bridge/ has the
# Dockerfile + werift server + tests; StreamBridgeContainer is exported from src/worker.ts:49 and defined in
# src/stream-bridge-container.ts). These three blocks provision the container DO on the deploying account
# (d674452f has CF Containers ‚Äî RecorderContainer + wave-bridge-edge-moqcontainer already run live) and the
# deploy pipeline builds/pushes the image. With STREAM_BRIDGE_ENABLED="1" the B1 webhook receiver dispatches
# /start to this container; until the bridge wk_ key (WHIP_KEY) + CF Stream webhook secret are provisioned the
# dispatch still fails CLOSED (stream-bridge.ts: binding-present but no key ‚Üí handled, logged + cron-requeued).
#
# IMAGE = a PRE-PUSHED CF-managed-registry ref, NOT the local Dockerfile path. Why: the image installs the
# org-internal @wave-av/whip-publish from GitHub Packages, which needs a BuildKit build secret (Dockerfile
# `--mount=type=secret,id=github_token`). `wrangler deploy`/`wrangler containers build` CANNOT pass BuildKit
# secrets (no --secret flag), and this repo is PUBLIC so the private dep must never be vendored in-tree. So the
# image is built ONCE locally (`docker buildx build --secret id=github_token ‚Ä¶`) and pushed
# (`wrangler containers push`) to the CF managed registry; deploy just references it (no build, no token in CI).
# Rebuild recipe lives in containers/stream-bridge/README.md. RecorderContainer above still builds from its
# Dockerfile (no private dep) ‚Äî wrangler supports a mixed build/reference set.
[[containers]]
class_name = "StreamBridgeContainer"
image = "registry.cloudflare.com/d674452f756fe46885a0d6ce7bc23f0a/wave-stream-bridge:v4-803bc93"
max_instances = 5

[[durable_objects.bindings]]
name = "STREAM_BRIDGE"
class_name = "StreamBridgeContainer"
# NOTE: the StreamBridgeContainer [[migrations]] block (tag v4) lives at the END of this file, AFTER v3 ‚Äî
# wrangler applies migrations in ARRAY ORDER after the last-applied tag (live = v3), so v4 MUST be last or it
# is silently never applied (deploy then fails: "class not configured to implement Durable Objects" [10061]).

# ‚îÄ‚îÄ Task #81 (LK-rip Phase 6b) ‚Äî Voice-Agent Session Durable Object (agent-session.ts AgentSessionDO) ‚îÄ‚îÄ
# One DO instance per room/agent-session (design ¬ßL1). Holds the two CF Realtime WS media-transport adapters
# (egress subscribe + ingest publish) + the echo harness. Exported from src/worker.ts so this binding +
# migration resolve on deploy. SQLite-backed DO (new_sqlite_classes) per the storage-governed default.
# FULLY INERT until VOICE_AGENT_PROVIDER="wave": the dispatch + egress routes (worker.ts) are gated by
# voiceAgentEnabled(env), so with the flag absent (the default) NOTHING routes to this DO ‚Äî the binding only
# exists so the migration can deploy. Arming VOICE_AGENT_PROVIDER="wave" in any live env is a ‚óÜ Jake-named
# crossing (design ¬ßL3). The live media-spike (deploy + a real room) is a SEPARATE Jake-named ‚óÜ.
[[durable_objects.bindings]]
name = "AGENT_SESSION"
class_name = "AgentSessionDO"

[[migrations]]
tag = "v3"
new_sqlite_classes = ["AgentSessionDO"]

# ‚îÄ‚îÄ #91 B2 ‚Äî StreamBridgeContainer DO migration. MUST be the LAST/highest migration tag so wrangler applies
# it as the delta after the live v3 tag (migrations are applied in array order). Its [[containers]] +
# [[durable_objects.bindings]] are declared above (binding order is irrelevant; only migration tag order is).
[[migrations]]
tag = "v4"
new_sqlite_classes = ["StreamBridgeContainer"]

[[unsafe.bindings]]
type = "plain_text"
name = "FOUNDATION_VERSION"
text = "scaffold"

# ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
# #136 (Canary C1) ‚Äî STAGING CANARY worker. A SEPARATE worker (wave-realtime-edge-canary) that exercises the
# raw-SFU CONTAINER recorder with AV1 + negotiation ON, WITHOUT touching the live prod worker. The top-level
# [vars]/bindings above stay BYTE-IDENTICAL (RT_ENCODER stays "managed" = the proven #127 PULL recorder); this
# block alone flips the container encode path, and ONLY for the canary worker.
#
# WRANGLER ENV SEMANTICS (verified, wrangler 4.100): an [env.X] block does NOT inherit top-level [vars] or
# bindings ([[r2_buckets]]/[[kv_namespaces]]/[[durable_objects.bindings]]/[[containers]]) ‚Äî each must be
# RESTATED. [[migrations]] ARE inherited from the top level and MUST NOT be restated per-env (restating throws
# a duplicate-tag error), so the canary reuses the top-level v1..v4 migrations as-is. We restate only what the
# canary worker needs to BOOT + run the container recorder: the encode flags, the ROOM + RECORDER DOs, the
# RECORDER container image, and a CANARY recordings bucket.
#
# workers_dev=true ‚Üí the canary gets a *.workers.dev URL (NOT rt.wave.online); NO custom-domain route is added,
# so it can never shadow the paid prod host. RT_RESIDENCY is intentionally NOT set (canary is single-region).
[env.canary]
name = "wave-realtime-edge-canary"
workers_dev = true

[env.canary.observability]
enabled = true

[env.canary.vars]
# Same realtime config the worker needs to boot. RT_ENCODER="container" + RECORDER_TARGET="cf" route video
# frames through the RecorderContainer (Path A); NEGOTIATION_ENABLED/AV1_DEFAULT arm the #86/#83 container
# behaviours ‚Äî these two are forwarded into the container process by RecorderContainer (recorder-container.ts).
RTK_APP_ID = "6dee33e5-cd89-41e8-a81c-9a8cd48bb9c3"
GATEWAY_BASE_URL = "https://api.wave.online"
RT_RECORD = "1"
RT_ENCODER = "container"
RECORDER_TARGET = "cf"
NEGOTIATION_ENABLED = "true"
AV1_DEFAULT = "1"

# Canary recordings bucket ‚Äî a DISTINCT bucket so canary recordings never mix with prod. Created in the deploy
# step (`wrangler r2 bucket create wave-realtime-recordings-canary`); --dry-run tolerates a not-yet-existing
# bucket. RT_RESIDENCY is unset, so RT_RECORDINGS_ENAM/EU are NOT needed (and not restated) on the canary.
[[env.canary.r2_buckets]]
binding = "RT_RECORDINGS"
bucket_name = "wave-realtime-recordings-canary"

# meetingId‚Üíorg map ‚Äî restated (same namespace id is fine; canary shares the lookup map).
[[env.canary.kv_namespaces]]
binding = "RT_MEETING_ORG"
id = "4acd6ec7b04546ba8767f2353d5394e8"

# ROOM DO ‚Äî restated so the canary worker boots (room.ts RoomDO; migrations v1 inherited from top level).
[[env.canary.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

# RECORDER container DO ‚Äî restated so `--env canary` resolves the container binding (migrations v2 inherited).
[[env.canary.containers]]
class_name = "RecorderContainer"
image = "./containers/rt-encoder/Dockerfile"
max_instances = 3

[[env.canary.durable_objects.bindings]]
name = "RECORDER"
class_name = "RecorderContainer"
