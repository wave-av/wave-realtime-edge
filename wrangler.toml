name = "wave-realtime-edge"
main = "src/worker.ts"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]
# Customer-facing realtime surface; never serve a workers.dev fallback for a paid host (siblings: false).
workers_dev = false

# CF-3 — customer-facing realtime surface (url-naming convention: <proto>.wave.online).
# ROUTES PLACEMENT LAW (config-no-silent-noop): `routes` MUST be a top-level key BEFORE any [table]
# header (e.g. before [vars]/[observability]/[[migrations]]). A `routes` key after a [table] is
# silently ignored ("Unexpected fields…routes") and the custom domain never attaches.
# Safe to route directly: /rtk/join and /rtk/turn are internal-secret-gated (401 without the gateway
# header); /health is public. The PAID public path is api.wave.online (gateway charges, then forwards).
# DO NOT attach/deploy this without Jake's named crossing (every-product-host-on-chassis law). After
# first deploy, audit for a stale Worker Route (rt.wave.online/*) that would shadow this custom_domain.
routes = [{ pattern = "rt.wave.online", custom_domain = true }]

[observability]
enabled = true

# RT-P2.5 — cron that runs scheduled() → reconcilePending: re-pulls any PULL-mode recording whose UPLOADED
# webhook pull failed POST-ack (RTK won't re-deliver after our 200), so a transient blip can't silently lose a
# customer recording. Idempotent (deterministic R2 key); clears the pending KV record on success. Cheap (KV
# list of a normally-empty set). No-op when RT_RECORDINGS/RT_MEETING_ORG are unbound.
#
# #35 — the second (*/5) trigger drives the WHIP orphan sweeper: a publish whose container is EVICTED or
# crashes never sends its teardown DELETE, so without a sweep its minutes are never billed at all. The
# interval bounds how much of a dead session's tail goes unbilled, hence the tighter cadence. scheduledHandler
# gates the reconciles above to the */15 tick (whip.ts WHIP_SWEEP_CRON), so their behaviour is unchanged.
# The sweep itself stays INERT until [vars] WHIP_SWEEP_ENABLED = "1".
[triggers]
crons = ["*/15 * * * *", "*/5 * * * *"]

[vars]
# CF-3.1.2 — RealtimeKit (CF Realtime) config. RTK_APP_ID is a non-secret app identifier.
RTK_APP_ID = "6dee33e5-cd89-41e8-a81c-9a8cd48bb9c3"
# CF_ACCOUNT_ID is injected at deploy (CI var or `wrangler deploy --var CF_ACCOUNT_ID:<id>`),
# kept out of source per the account-id scrub policy (CF-0 D1).
# CF_API_TOKEN is a SECRET — `wrangler secret put CF_API_TOKEN` (account API token w/ Calls/Realtime
# scope). Never commit it; the worker returns ONLY the per-participant join token, never this token.
#
# CF-3 TURN (/rtk/turn) — BOTH are wrangler SECRETS (kept out of this public repo + persist across
# deploys, avoiding the CF_ACCOUNT_ID --var footgun). `wrangler secret put`:
#   TURN_KEY_ID     — the CF TURN key uid (32-hex). Identifier, not a credential on its own.
#   TURN_KEY_TOKEN  — the TURN key's api token (created via POST /accounts/{acc}/calls/turn_keys, shown
#                     once). The worker returns ONLY the ephemeral ICE username/credential, never this token.
# Unset → /rtk/turn fails closed (503 REALTIME_NOT_CONFIGURED).

# GATEWAY_BASE_URL — the WAVE gateway origin the metering tap reports usage to (public, non-secret).
# = https://api.wave.online. (sfu.ts/room.ts are P5 substrate; the metering tap reads this when wired.)
GATEWAY_BASE_URL = "https://api.wave.online"

# ── E3.P2/P4 (#127) DATA-RESIDENCY arm flag. DEFAULT OFF / FULLY INERT. ──
# Absent/"0"/"false" -> the recorder is BYTE-IDENTICAL to today: every recording lands in RT_RECORDINGS at the
# non-region key with NO gateway register() call (buildPullSink attaches no residency deps). Set RT_RESIDENCY="1"
# to ARM: an NA session (request.cf.continent NA -> zone us-east) lands in RT_RECORDINGS_ENAM and an EU session
# (EU -> eu-west) in RT_RECORDINGS_EU, each at `${org}/realtime-recordings/${zone}/${meetingId}/recording.<ext>`,
# then is POSTed to the gateway `${WAVE_GATEWAY_ORIGIN||GATEWAY_BASE_URL}/v1/internal/recordings/register` with
# WAVE_SERVICE_TOKEN (residency enforcement). Other continents fall back to the default RT_RECORDINGS path (no
# zone invented). Flipping RT_RESIDENCY in any live env is a Jake-named ◆ crossing (multi-region storage go-live).
# WAVE_GATEWAY_ORIGIN is OPTIONAL (defaults to GATEWAY_BASE_URL above); WAVE_SERVICE_TOKEN is the EXISTING
# wrangler SECRET the metering tap already uses (no new secret).
RT_RESIDENCY = "1"   # ARMED 2026-06-28 — #127 ◆ crossing (Jake-named, full-arc). WAVE is the dogfood customer.

# ── B3 (#98) — IETF WHIP v1 ingest surface (/v1/whip/*). DEFAULT OFF / INERT. ──
# WHIP_INGEST_ENABLED gates the whole /v1/whip/{publish,resource/{id}} listener (src/whip.ts). Absent/"0" →
# the surface is inert: a /v1/whip/* request falls through to the honest 501 catch-all (worker.ts), exactly
# as before this builder. ARMED "1" (#77 go-live, Jake-authorized 2026-06-24). Preconditions MET:
#   • gateway WHIP_EDGE=https://rt.wave.online is set — POST /v1/whip/publish with a real whip:write key proved
#     the 503→501 transition (gateway auth→scope→forward all green; only this flag gates the listener);
#   • the x-wave-internal seal is the LIVE realtime secret (this worker's WAVE_INTERNAL_SECRET == gateway
#     WAVE_REALTIME_INTERNAL_SECRET, already proven by realtime forwarding) — no new secret;
#   • metering is counts-but-bills-$0 until STRIPE_PRICE_WHIP_INGEST_MIN is bound (money ◆, bill-from-launch).
# SAFE rollout: ingest REQUIRES the whip:write scope, which NO customer key holds yet (only WAVE test keys), so
# enabling customers stays a deliberate per-key scope-grant — flipping this exposes nothing broken to customers.
WHIP_INGEST_ENABLED = "1"

# WHIP_SWEEP_ENABLED (#35) arms the WHIP orphan sweeper on the */5 cron (src/whip.ts sweepWhipResources).
# A publish torn down cleanly bills via handleDelete; a publish whose CONTAINER IS EVICTED OR CRASHES never
# sends that teardown DELETE, so without this sweep its minutes are never billed at all. Absent/"0" → the
# cron tick is a no-op. ARMED "1" ◆ 2026-07-18 (Jake-named: "Merge + deploy + arm the sweeper").
# SAFE: bills only sessions the SFU reports GONE, only up to a VERIFIED lastSeenAt (never to sweep-time),
# is idempotent on event_id=resourceId (cannot double-bill a racing client DELETE), and defers rather than
# drops when a usage emit is not confirmed. Inert on its own if GATEWAY_BASE_URL/WAVE_SERVICE_TOKEN are unset.
WHIP_SWEEP_ENABLED = "1"

# CONTAINER_HEALTH_ALARM_ENABLED (#234) arms the container-app WEDGE alarm on the */15 cron
# (src/container-health-alarm.ts). The signature it watches — `active > 0 && healthy == 0` — is what
# wedged stream bridging account-wide with EVERY existing telemetry reading green (`failed:0` the whole
# time, because zombie instances are not counted as failures). It was found by hand, by accident.
# READ-ONLY: one authenticated GET of the container-applications list per 15 min, no mutation of anything.
# Absent/"0" → the tick is a no-op and no API call is made. Also inert without CF_API_TOKEN/CF_ACCOUNT_ID.
CONTAINER_HEALTH_ALARM_ENABLED = "1"

# ── #53 — IETF WHEP v1 egress surface (/v1/whep/*). DEFAULT OFF / INERT. ──
# WHEP_EGRESS_ENABLED gates the whole /v1/whep/{subscribe,resource/{id}} listener (src/whep.ts) — the egress
# SIBLING of WHIP above. Absent/"0" → the surface is inert: a /v1/whep/* request falls through to the honest
# 501 catch-all (worker.ts), UNCHANGED. Flipping this to "1" on a live env is a Jake-named ◆ crossing (NEW
# LIVE EGRESS path activation — docs/whep-v1-frozen-contract.md §6/§7) and is the ORCHESTRATOR's deploy, not
# this builder's: when armed, an unauthenticated /v1/whep/subscribe probe is 401 (gateway-trust), not 501.
# Preconditions for go-live: gateway /v1/whep/* forward mapping + whep:read scope + STRIPE_PRICE_WHEP_EGRESS_MIN
# binding (orphan meter blocks GA). Reuses the EXISTING x-wave-internal realtime seal + RT_MEETING_ORG KV.
# Default OFF until that ◆.
WHEP_EGRESS_ENABLED = "1"   # ◆ ARMED 2026-07-01 (Jake-named: "activate the WHEP egress transport live end-to-end")
# Source = Cloudflare Stream WebRTC playback (one-shot WHEP). USE_CLOUDFLARE_STREAM is the backend gate —
# absent/"0" → /v1/whep/subscribe fails closed 503 (in addition to the WHEP_EGRESS_ENABLED surface gate above).
# The playback URL is resolved from `wrangler secret put` SECRETS (NEVER in this file): WHEP_SRC_URL_TEMPLATE
# (Stream playback URL with a `{uid}` placeholder; the customer code is baked in, NO token in the URL), or
# built from CF_STREAM_CUSTOMER_CODE. CF_STREAM_API_TOKEN is reserved for Stream-API source resolution. Org
# isolation reuses the `stream-input-org:{uid}` KV map (src/stream-bridge.ts).
USE_CLOUDFLARE_STREAM = "1"  # ◆ ARMED 2026-07-01 — CF Stream WebRTC playback backend live

# ── #75 E-EGRESS-ROUTER — routed egress. DEFAULT OFF / FULLY INERT. ──
# EGRESS_ROUTER_ENABLED gates whether the RoomDO instantiates a routed-egress MediaConsumer (#74 tap) and drives it
# through egressRoute (#75 P1). Absent/"0" → NO egress consumer is attached: the tap fans out to nothing new and the
# room path is BYTE-IDENTICAL to today. The first backend is wave-render (#75 P2, src/egress-wave-render.ts) — it
# composites the room view into a branded still via the wave-render origin. Flipping this to "1" on a live env is a
# Jake-named ◆ crossing (NEW LIVE EGRESS activation), and depends on the ARM slice wiring the consumer into the
# RoomDO + the concrete wave-render HTTP client. Preconditions for go-live: MEDIA_TAP_ENABLED armed (the tap must
# publish frames), WAVE_RENDER_URL bound, and the WAVE_INTERNAL_RENDER_TOKEN secret provisioned (below). Until then
# the backend module ships but is never instantiated — inert.
# WAVE_RENDER_URL — wave-render origin base URL (public, non-secret; bound at the ARM slice, NOT a credential).
# WAVE_INTERNAL_RENDER_TOKEN is a wrangler SECRET — `wrangler secret put WAVE_INTERNAL_RENDER_TOKEN` (Doppler
# wave/prd). Unset → the wave-render client presents no bearer and the origin fails it closed (UNTRUSTED → 402).
# The SECOND backend is RunPod NVENC (#75 P3, src/egress-runpod-nvenc.ts) — the GPU escalation backstop for jobs
# beyond wave-render's envelope (4K / HEVC-AV1 / real-time-at-scale). It shares THIS flag (one flag arms the egress
# router + all its backends) and reports grounded COGS = measured gpuSeconds × the L40S flex rate. Its ARM slice adds:
# RUNPOD_NVENC_ENDPOINT — RunPod serverless NVENC endpoint base URL (public, non-secret; bound at the ARM slice).
# RUNPOD_API_TOKEN is a wrangler SECRET — `wrangler secret put RUNPOD_API_TOKEN` (Doppler wave/prd). Unset → the
# RunPod client cannot authenticate and the encode fails closed. NO list/$/min price ships — a throughput bench (real
# GPU-seconds per encoded minute) precedes any pricing, per the measure-before-benching rule.
# The THIRD backend is CF Stream passthrough (#75 P4, src/egress-cf-stream-passthrough.ts) — the cheapest tier: record
# or RTMP-simulcast a track AS-IS (no compositing/encode). A one-shot provisioner (not a tap consumer); a simulcast's
# external rtmp/rtmps destination is scheme-validated before the sink. Shares THIS flag. Its ARM slice reuses the CF
# Stream scope: CF_STREAM_API_TOKEN is a wrangler SECRET — `wrangler secret put CF_STREAM_API_TOKEN` (Doppler wave/prd;
# same token the #77 ingress backend documents) — used to create CF Stream recordings / live outputs.
EGRESS_ROUTER_ENABLED = "0"  # INERT — #75 P2/P3/P4 backends built; arming is a ◆ Jake crossing (ARM slice wires the RoomDO)

# ── #77 E-INGRESS — routed ingest. DEFAULT OFF / FULLY INERT. ──
# INGRESS_ROUTER_ENABLED gates whether the ingest entrypoint provisions inbound sources through ingressRoute (#77 P1)
# instead of the legacy single path. Absent/"0" → NO routed provisioning happens: ingress is BYTE-IDENTICAL to today.
# The first backend is CF Stream Live (#77 P2, src/ingress-cf-stream-live.ts) — it provisions a CF Stream Live input
# (free managed RTMP/SRT push + URL pull) and writes the `stream-input-org:${uid}` → org binding the Plane-1 receiver
# (stream-bridge.ts) requires. Flipping this to "1" on a live env is a Jake-named ◆ crossing (NEW routed-ingest
# provisioning), and depends on the ARM slice wiring provisioning into the ingest entrypoint + the concrete CF Stream
# Live client. Preconditions: STREAM_BRIDGE_ENABLED armed (the receiver, already "1") + CF_STREAM_API_TOKEN provisioned
# (below). Until then the backend module ships but is never instantiated — inert.
# CF_STREAM_API_TOKEN is a wrangler SECRET — `wrangler secret put CF_STREAM_API_TOKEN` (CF account token w/ Stream
# scope; Doppler wave/prd). CF_STREAM_CUSTOMER_CODE builds the RTMPS/SRT ingest endpoint URLs (non-secret [vars] or
# secret). Unset → the concrete client cannot create live inputs (the backend stays inert regardless).
# The SECOND backend is WHIP/WebRTC (#77 P3, src/ingress-whip-sfu.ts) — the most-direct tier (cfCallsSfu): native WHIP
# publishes straight into the SFU (the existing whip.ts surface), no transcode/managed hop/container. Shares THIS flag.
# Its ARM slice negotiates the WHIP publish via the CF Calls app pair the whip.ts surface already uses: CF_CALLS_APP_ID
# (non-secret) + CF_CALLS_APP_SECRET (a wrangler SECRET — `wrangler secret put CF_CALLS_APP_SECRET`, Doppler wave/prd).
# The THIRD backend is the container bridge (#77 P4, src/ingress-container-bridge.ts) — the most-owned-compute tier
# (containerBridge): the router-facing adapter over the EXISTING Plane-2 control plane (ingest-bridge.ts, F #55) that
# starts a per-protocol container leg (rist/moq backstop + self-hosted rtmp/srt) → WHIP-publishes into the SFU. Shares
# THIS flag; its container bindings (SRT_BRIDGE/RIST_BRIDGE/RTMPS_BRIDGE/MOQ_BRIDGE) live in the ingest-bridge runtime
# env and stay COMMENTED until each leg's own go-live (absent → fail-closed 501). It adds the SSRF guard (guardIngestHost
# /guardPullUrl) the router deferred to P4 — an untrusted inbound host the container may dial is rejected if it targets
# an internal/loopback/link-local/metadata/CGNAT(tailnet) address before the container-start sink.
INGRESS_ROUTER_ENABLED = "1"  # ARMED 2026-07-15 (Jake-named ◆, whep-live-egress epic): the ONLY runtime caller is maybeHandleWhepSources (whep-sources.ts) → arms POST/GET /v1/whep/sources (gatewayGate + x-wave-org). P3/P4 backends re-export the flag but are never instantiated, so no other live behavior changes. Requires the Stream token bound (CLOUDFLARE_STREAM_API_TOKEN, provisioned).

# ── B1 (#91-a) — CF Stream Live → SFU bridge control plane (POST /v1/stream/bridge/webhook). DEFAULT OFF. ──
# STREAM_BRIDGE_ENABLED gates the self-authenticating CF Stream webhook receiver (src/stream-bridge.ts). Absent/
# "0" → the route falls through to the honest 501 catch-all, UNCHANGED — the whole bridge is inert. The webhook
# is HMAC-verified against WAVE_STREAM_WEBHOOK_SECRET (a wrangler SECRET — `wrangler secret put`, set at ◆
# go-live when the CF Stream webhook subscription is created). The republisher container (B2) binding below
# is now UNCOMMENTED (B2 landed) — but a /start still fails CLOSED until the bridge wk_ key + CF Stream webhook
# secret are provisioned, so arming the receiver exposes nothing broken.
# ◆ ARMED "1" (#48 go-live, Jake-named 2026-06-26).
STREAM_BRIDGE_ENABLED = "1"

# ── #88 M2 — Zoom RTMS → WAVE bridge control plane (POST /zoom/rtms). DEFAULT OFF / FULLY INERT. ──
# WAVE_ZOOM_RTMS gates the self-authenticating Zoom RTMS webhook receiver (src/zoom-rtms-bridge.ts). Absent/
# "0" → the route falls through to the honest 501 catch-all, UNCHANGED — the whole bridge is inert. The webhook
# is HMAC-verified against ZOOM_RTMS_WEBHOOK_SECRET_TOKEN (a wrangler SECRET — `wrangler secret put`, = the Zoom
# app's Event-notification "Secret Token"; empty → every webhook 401s, fail-closed). This receiver only verifies
# + acks lifecycle events and answers url_validation; the OUTBOUND signaling+media WebSocket dial-out (which dials
# Zoom's servers, transcodes via rtmsAudioToSfuPcm, and injects into a room) is the ◆ follow-up slice and needs a
# live Zoom meeting to prove. Arming this flag in a live env is a Jake-named ◆ crossing.
WAVE_ZOOM_RTMS = "1"

# ── #82/#114 CASCADE multi-region relay (RT_CASCADE). INERT by default. ──
# Absent/"0"/"false" → the realtime room path is byte-identical to today: a join routes to the PRIMARY Room
# DO `idFromName(org:room)` with NO locationHint and NO regional relay. Set RT_CASCADE="1" → a regional join
# is placed on its nearest-HEALTHY region's relay DO (a strict-suffix `org:room:region` key) via
# ROOM.get(id,{locationHint}); resolver = src/cascade.ts (PURE), glue = src/cascade-sink.ts. Each per-region
# relay/recorder spawn is a Jake-named ◆ crossing (cascade ADR §◆) — NOT a blanket global flip.
# RT_CASCADE = "1"

# ── Task #81 (LK-rip Phase 6b) — Voice-Agent runtime provider flag. DEFAULT OFF / FULLY INERT. ──
# Absent/anything-but-"wave" → the /v1/realtime/agents/* dispatch + egress routes are skipped entirely
# (voiceAgentEnabled(env)=false) and a request falls through to the honest 501 catch-all — UNCHANGED. Setting
# VOICE_AGENT_PROVIDER="wave" arms the routes + the AgentSessionDO; that flip in any live env is a ◆ Jake-named
# crossing (design §L3 build order step 8).
# ◆ ARMED 2026-06-25 (Jake-named GA cutover, #81): voice-agent routes + AgentSessionDO live. Routes only
# activate on an explicit agent bind (POST /v1/realtime/agents/bind); live rooms are unaffected until bound.
VOICE_AGENT_PROVIDER = "wave"

# ── #81 step-4 barge-in — TTS real-time send-ahead LEAD (ms). speak() paces the reply to the playout clock so
# the agent the LISTENER hears is interruptible: turnInFlight spans playout (bargeIn fires mid-reply) and on
# abort only ≤lead drains. Default in code is 150 (audio-safe); TUNED to 30 here from a live leg4 sweep
# (2026-06-26): 150ms→~1100ms end-to-end barge stop, 40ms→~540ms, 20ms→~104-147ms; 30 keeps barge-in well under
# the 300ms target with a small anti-underrun cushion above 20. 0 disables pacing (legacy bulk send).
AGENT_TTS_LEAD_MS = "30"

# ── RT-P1.5 — pluggable recording encoders (design §6). DEFAULT DISARMED / DORMANT. ──
# RT_RECORD arms recording at all; absent/"0" → selectEncoder() returns the inert DisarmedEncoder (begin →
# null), so the whole feature is a no-op (config-no-silent-noop: inert, not silently broken). Arming
# RT_RECORD=1 in any live env is a ◆ Jake-named crossing (design §8.5(6)).
# ◆ ARMED at RT-P2.4 (#34, Jake-named): managed (C) recording is live in PULL mode. RealtimeKit CANNOT upload
# into R2 (its storage_config enum is aws|azure|digitalocean|gcs|sftp — no R2 option; type:"cloudflare" is
# silently dropped → recording lands in RTK's OWN bucket, breaking our org-prefix sweep). So RTK records to
# its own storage and the recording.statusUpdate UPLOADED webhook PULLS the finished file into RT_RECORDINGS
# at an org-rooted key (the daily storage sweep bills by org-prefix). CF_API_TOKEN/CF_ACCOUNT_ID are wrangler
# SECRETS. The retired direct-mode S3 creds (RT_R2_ACCESS_KEY_ID/SECRET) have been DELETED from the worker
# + Doppler and their bucket-scoped R2 token (wave-realtime-recordings-rtk-rw) REVOKED (#70) — pull mode
# writes via the RT_RECORDINGS R2 binding, never S3 creds, so nothing references them.
RT_RECORD = "1"
# RT_ENCODER selects the adapter when armed: "managed" (C, the buildable path) | "container" (A) | "wasm"
# (B). A/B are BLOCKED-ON-RT-P0.1-spike and throw NOT_SPIKED at begin until the §7 WS media-transport spike.
RT_ENCODER = "managed"
# (PULL mode hands RTK NO storage_config, so there is no RT_RECORDINGS_BUCKET var — the bucket is bound
# directly below as the R2 binding the webhook pull writes into.)

# ── RT-P2.5 — the SKIP sink R2 bucket (RT_RECORDINGS) + the meetingId→org map (RT_MEETING_ORG). ──
# The recording webhook fetches the finished RTK recording and streams it into RT_RECORDINGS at
# `${org}/realtime-recordings/${meetingId}/recording.<ext>`; RT_MEETING_ORG carries org from the stateless
# /rtk/join to that later webhook so the pull can attribute it. tier=SKIP (no dedup index is ever touched).
[[r2_buckets]]
binding = "RT_RECORDINGS"
bucket_name = "wave-realtime-recordings"

# ── E3.P2/P4 (#127) DATA-RESIDENCY jurisdiction buckets. BOUND but only USED when RT_RESIDENCY is on. ──
# These two buckets ALREADY EXIST and are the SAME residency-correct buckets the gateway enforces against
# (gateway RESIDENCY_BUCKETS="enam=wave-recordings-enam,eu=wave-recordings-eu"). Bound here so the residency
# pull can write an NA session's bytes into wave-recordings-enam (zone us-east -> jurisdiction enam) and an EU
# session's into wave-recordings-eu (zone eu-west -> jurisdiction eu). With RT_RESIDENCY ABSENT/"0" (default),
# buildResidencyDeps() is never attached -> these bindings are NEVER read -> every recording still lands in
# RT_RECORDINGS exactly as today. Binding present + inert until RT_RESIDENCY is named (Jake-named ◆).
[[r2_buckets]]
binding = "RT_RECORDINGS_ENAM"
bucket_name = "wave-recordings-enam"

[[r2_buckets]]
binding = "RT_RECORDINGS_EU"
bucket_name = "wave-recordings-eu"
# EU DATA-RESIDENCY: this bucket lives in CF R2's EU jurisdiction namespace (location EEUR), so the binding
# MUST declare jurisdiction = "eu" — without it the binding resolves to the default (non-EU) namespace and an
# EU session's bytes would NOT be residency-correct. (#127 ◆ Jake-named EU-residency crossing, 2026-06-28.)
jurisdiction = "eu"

# ── #114 T2 — APAC + SAM residency buckets (INERT: bound + ready, ZERO traffic). ──
# Staged for the N-region registry (src/region-registry.ts) apac/sam entries, which stay enabled:false until
# their ◆ Jake-named live flip (T3). Both buckets EXIST on the d674452f R2 account (created 2026-07-14) in the
# DEFAULT jurisdiction namespace — mirroring the registry's `jurisdiction: "default"` for both (unlike the EU
# bucket above, so NO jurisdiction line here). They are NEVER read while the registry entries are enabled:false:
# regionForContinent()/activeRegions() exclude disabled entries, so AS/OC/SA sessions fall to the default
# RT_RECORDINGS path EXACTLY as today. Binding present + inert until the region is flipped enabled:true (◆).
[[r2_buckets]]
binding = "RT_RECORDINGS_APAC"
bucket_name = "wave-recordings-apac"

[[r2_buckets]]
binding = "RT_RECORDINGS_SAM"
bucket_name = "wave-recordings-sam"

[[kv_namespaces]]
binding = "RT_MEETING_ORG"
id = "4acd6ec7b04546ba8767f2353d5394e8"   # `wrangler kv namespace create RT_MEETING_ORG` (d674452f acct)

# ── CF Realtime SFU app creds (P5 — sfu.ts) — wrangler SECRETS, referenced not valued ──
# These are NOT set here. Set via `wrangler secret put`, values from Doppler wave/prd:
#   CF_CALLS_APP_ID      — CF Realtime app id (app "wispy-feather-fa96"). sfu.ts SfuClient appId.
#   CF_CALLS_APP_SECRET  — the app secret (Bearer to rtc.live.cloudflare.com). Never logged/returned.
# Unset → SfuClient fails closed (503 REALTIME_NOT_CONFIGURED), preserving the current /rtk surface.
#
# ── Metering tap (room.ts → gateway) — wrangler SECRET ──
#   WAVE_SERVICE_TOKEN   — bearer the metering tap presents to the gateway /v1/internal/usage path.
#                          `wrangler secret put WAVE_SERVICE_TOKEN` (Doppler wave/prd). Unset → no emit.
#
# ── Internal gateway-trust seal (dispatch-helpers.ts gatewayGate; zoom-rtms-bridge-do.ts:317,319) — wrangler SECRET ──
#   WAVE_INTERNAL_SECRET — HMAC/shared secret the edge checks on the `x-wave-internal` seal. Set live (proven #155:
#                          bogus seal → 401, gateway's WAVE_REALTIME_INTERNAL_SECRET seal → passes). Also fuels the
#                          Zoom RTMS media dial-in (ZOOM_RTMS_BRIDGE DO). `wrangler secret put WAVE_INTERNAL_SECRET`
#                          (Doppler wave/prd). Unset → gatewayGate fails closed (401), edge locked to gateway only.

# ── Room Durable Object (room.ts RoomDO) — per-room state (participants, track registry, TTL) ──
# RoomDO is exported from src/worker.ts (the main module) so this binding + migration resolve on the
# first deploy. SQLite-backed DO (new_sqlite_classes) per the storage-governed default.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# ── RT-R10 (#72) — PORTABLE raw-SFU encode container (Path A). ARMED (Step A) = infra deployed, encoder dormant. ──
# The rt-encoder image (containers/rt-encoder/) transcodes JPEG→VP8 / PCM→Opus for the raw-SFU recorder — work
# the Workers isolate can't host (no libvpx/libopus). The class RecorderContainer is exported from src/worker.ts
# (mirrors bridge-edge's MoqContainer). Step A (#67b, Jake-named ◆ A) UNCOMMENTS these three blocks so the
# container DO is provisioned on the deploying account (d674452f has CF Containers — wave-bridge-edge-moqcontainer
# runs live) AND the image is built/pushed by the deploy pipeline. The encoder STAYS dormant: RT_ENCODER remains
# "managed" (the live PULL-mode path) and RECORDER_TARGET is unset (defaults 'none' →
# src/encoders/recorder-target.ts NoneTarget), so the RecorderContainer infra is armed but never invoked. The
# encoder flip to RECORDER_TARGET="cf" is Step D (separate Jake-named ◆).
[[containers]]
class_name = "RecorderContainer"
image = "./containers/rt-encoder/Dockerfile"
max_instances = 3

[[durable_objects.bindings]]
name = "RECORDER"
class_name = "RecorderContainer"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RecorderContainer"]

# ── B1/B2 (#91) — CF Stream → SFU bridge republisher container (StreamBridgeContainer, MODE=whep-to-whip). ──
# ◆ ARMED at go-live (#48, Jake-named 2026-06-26): B2 landed (PR #104 — containers/stream-bridge/ has the
# Dockerfile + werift server + tests; StreamBridgeContainer is exported from src/worker.ts:49 and defined in
# src/stream-bridge-container.ts). These three blocks provision the container DO on the deploying account
# (d674452f has CF Containers — RecorderContainer + wave-bridge-edge-moqcontainer already run live) and the
# deploy pipeline builds/pushes the image. With STREAM_BRIDGE_ENABLED="1" the B1 webhook receiver dispatches
# /start to this container; until the bridge wk_ key (WHIP_KEY) + CF Stream webhook secret are provisioned the
# dispatch still fails CLOSED (stream-bridge.ts: binding-present but no key → handled, logged + cron-requeued).
#
# IMAGE = a PRE-PUSHED CF-managed-registry ref, NOT the local Dockerfile path. Why: the image installs the
# org-internal @wave-av/whip-publish from GitHub Packages, which needs a BuildKit build secret (Dockerfile
# `--mount=type=secret,id=github_token`). `wrangler deploy`/`wrangler containers build` CANNOT pass BuildKit
# secrets (no --secret flag), and this repo is PUBLIC so the private dep must never be vendored in-tree. So the
# image is built ONCE locally (`docker buildx build --secret id=github_token …`) and pushed
# (`wrangler containers push`) to the CF managed registry; deploy just references it (no build, no token in CI).
# Rebuild recipe lives in containers/stream-bridge/README.md. RecorderContainer above still builds from its
# Dockerfile (no private dep) — wrangler supports a mixed build/reference set.
[[containers]]
class_name = "StreamBridgeContainer"
# v8-2d869f3 (◆ 2026-07-19) — carries #230: the relay's localhost RTP ports are now OS-assigned per
# relay instead of a fixed 5004/5006. The fixed pair meant a SECOND concurrent relay on an instance died
# with `bind EADDRINUSE 127.0.0.1:5004` (surfaced as a /start 502), so two customers broadcasting at once
# could not both be bridged — a hard multi-tenant ceiling — and a half-torn-down relay held the port until
# the instance was recycled. Local amd64 image sha256:2517839771eaa1bfd274834d2b61075ad7260dba55fbf205aac075f87b37693b.
#
# Also carries v7's #236 (truthful /health) and v6's #2 (video-only sources no longer 502).
#
# NOTE: a container image change triggers a ROLLOUT, which SIGKILLs in-flight bridges (#235 — no drain).
# Deploy this when no customer broadcast is live until that lands.
image = "registry.cloudflare.com/d674452f756fe46885a0d6ce7bc23f0a/wave-stream-bridge:v8-2d869f3"
# 30, not 5 (#231). One bridge instance = one concurrent customer broadcast, so 5 was both a hard
# multi-tenant ceiling AND a fragility: five leaked instances wedged bridging account-wide with no
# self-healing. Account limits are nowhere near binding (total_vcpu 1500 vs 0.0625 per default
# instance), so the cap's only job is to bound blast radius — 30 does that without being a ceiling a
# real customer can hit. Pairs with the release-on-failed-start fix in stream-bridge-poll.ts; the cap
# alone would only have delayed the wedge, not prevented it.
max_instances = 30

[[durable_objects.bindings]]
name = "STREAM_BRIDGE"
class_name = "StreamBridgeContainer"
# NOTE: the StreamBridgeContainer [[migrations]] block (tag v4) lives at the END of this file, AFTER v3 —
# wrangler applies migrations in ARRAY ORDER after the last-applied tag (live = v3), so v4 MUST be last or it
# is silently never applied (deploy then fails: "class not configured to implement Durable Objects" [10061]).

# ── Task #81 (LK-rip Phase 6b) — Voice-Agent Session Durable Object (agent-session.ts AgentSessionDO) ──
# One DO instance per room/agent-session (design §L1). Holds the two CF Realtime WS media-transport adapters
# (egress subscribe + ingest publish) + the echo harness. Exported from src/worker.ts so this binding +
# migration resolve on deploy. SQLite-backed DO (new_sqlite_classes) per the storage-governed default.
# FULLY INERT until VOICE_AGENT_PROVIDER="wave": the dispatch + egress routes (worker.ts) are gated by
# voiceAgentEnabled(env), so with the flag absent (the default) NOTHING routes to this DO — the binding only
# exists so the migration can deploy. Arming VOICE_AGENT_PROVIDER="wave" in any live env is a ◆ Jake-named
# crossing (design §L3). The live media-spike (deploy + a real room) is a SEPARATE Jake-named ◆.
[[durable_objects.bindings]]
name = "AGENT_SESSION"
class_name = "AgentSessionDO"

[[migrations]]
tag = "v3"
new_sqlite_classes = ["AgentSessionDO"]

# ── #88 M2 — Zoom RTMS → WAVE media bridge Durable Object (zoom-rtms-bridge-do.ts ZoomRtmsBridgeDO) ──
# One DO instance per Zoom meeting (idFromName(meeting_uuid)). Owns the outbound Zoom signaling+media WS legs
# and the SFU-facing ingest sink socket; RtmsBridgeCore pumps rtmsAudioToSfuPcm into the mapped wave room.
# Exported from src/worker.ts so this binding + migration resolve on deploy. SQLite-backed (new_sqlite_classes)
# per the storage-governed default. FULLY INERT until WAVE_ZOOM_RTMS is truthy: the /zoom/rtms webhook seam +
# the /zoom/rtms/ingest route (route-dispatch.ts) are gated by zoomRtmsEnabled(env), so with the flag off (the
# default) NOTHING routes here — the binding only exists so the migration can deploy. Even armed it fails CLOSED
# without ZOOM_APPS_CLIENT_ID/SECRET (wrangler SECRETS) + a meeting→room entry in RT_MEETING_ORG. Arming the
# flag + provisioning those secrets + the live-meeting proof is a ◆ Jake-named crossing.
[[durable_objects.bindings]]
name = "ZOOM_RTMS_BRIDGE"
class_name = "ZoomRtmsBridgeDO"

# ── #91 B2 — StreamBridgeContainer DO migration. Applied as a delta after the live v3 tag (migrations run in
# array order). Its [[containers]] + [[durable_objects.bindings]] are declared above (binding order is
# irrelevant; only migration tag order is). v4 MUST stay ahead of v5 below.
[[migrations]]
tag = "v4"
new_sqlite_classes = ["StreamBridgeContainer"]

# ── #88 M2 — ZoomRtmsBridgeDO migration. The NEW highest/last tag: it applies after v4 (array order). Keep any
# future migration strictly after this block, or wrangler silently skips it (class not configured → 10061).
[[migrations]]
tag = "v5"
new_sqlite_classes = ["ZoomRtmsBridgeDO"]

[[unsafe.bindings]]
type = "plain_text"
name = "FOUNDATION_VERSION"
text = "scaffold"

# ════════════════════════════════════════════════════════════════════════════════════════════════════════
# #136 (Canary C1) — STAGING CANARY worker. A SEPARATE worker (wave-realtime-edge-canary) that exercises the
# raw-SFU CONTAINER recorder with AV1 + negotiation ON, WITHOUT touching the live prod worker. The top-level
# [vars]/bindings above stay BYTE-IDENTICAL (RT_ENCODER stays "managed" = the proven #127 PULL recorder); this
# block alone flips the container encode path, and ONLY for the canary worker.
#
# WRANGLER ENV SEMANTICS (verified, wrangler 4.100): an [env.X] block does NOT inherit top-level [vars] or
# bindings ([[r2_buckets]]/[[kv_namespaces]]/[[durable_objects.bindings]]/[[containers]]) — each must be
# RESTATED. [[migrations]] ARE inherited from the top level and MUST NOT be restated per-env (restating throws
# a duplicate-tag error), so the canary reuses the top-level v1..v4 migrations as-is. We restate only what the
# canary worker needs to BOOT + run the container recorder: the encode flags, the ROOM + RECORDER DOs, the
# RECORDER container image, and a CANARY recordings bucket.
#
# workers_dev=true → the canary gets a *.workers.dev URL (NOT rt.wave.online); NO custom-domain route is added,
# so it can never shadow the paid prod host. RT_RESIDENCY is intentionally NOT set (canary is single-region).
[env.canary]
name = "wave-realtime-edge-canary"
workers_dev = true
# ROUTE ISOLATION (incident 2026-07-12): `routes = []` PINS the canary to its *.workers.dev URL ONLY. Without
# it, `wrangler deploy --env canary` inherited the top-level custom-domain route for rt.wave.online and
# REASSIGNED that prod host onto the canary worker (verified: CF domain c41d31ca… pointed at
# wave-realtime-edge-canary; rt.wave.online was served by the canary until re-pointed back). An explicit empty
# routes list overrides that inheritance so the canary can NEVER attach/override a prod host again. Placed
# BEFORE any [env.canary.*] subtable per the ROUTES PLACEMENT LAW documented above. (Comment avoids the literal
# route-config token by design — test/wrangler-inert.test.ts asserts that token never appears in this block.)
routes = []

[env.canary.observability]
enabled = true

[env.canary.vars]
# Same realtime config the worker needs to boot. RT_ENCODER="container" + RECORDER_TARGET="cf" route video
# frames through the RecorderContainer (Path A); NEGOTIATION_ENABLED/AV1_DEFAULT arm the #86/#83 container
# behaviours — these two are forwarded into the container process by RecorderContainer (recorder-container.ts).
RTK_APP_ID = "6dee33e5-cd89-41e8-a81c-9a8cd48bb9c3"
GATEWAY_BASE_URL = "https://api.wave.online"
RT_RECORD = "1"
RT_ENCODER = "container"
RECORDER_TARGET = "cf"
NEGOTIATION_ENABLED = "true"
AV1_DEFAULT = "1"
# #145 (#91-C) — arm the WHIP ingest surface + the #144 room-recording route on the canary so a real direct-WHIP
# publish flows through a RoomDO room → recorder tap + negotiation (the live av1-recorded receipt). Named envs do
# NOT inherit top-level [vars], so these flags are restated here. Liveness additionally needs the canary SECRETS
# CF_CALLS_APP_ID + CF_CALLS_APP_SECRET (SFU app pair) + WAVE_INTERNAL_SECRET (gateway trust) — all provisioned
# from Doppler wave/prd via the foundation provision-worker-secrets workflow (CF_CALLS_APP_ID is a SECRET on prod
# too, not a [vars] value — do NOT hardcode it here).
WHIP_INGEST_ENABLED = "1"
# #151 (#145-video D) — arm the hosted recorder-INGEST route on the canary: PUT /v1/realtime/recording-ingest/*
# accepts the self-host werift recorder's streamed WebM and the RoomDO writes the single canonical R2 object.
# Auth reuses the canary's existing WAVE_INTERNAL_SECRET (gateway trust) — the recorder dials in with a pre-signed
# capability token, so NO new secret is needed. Canary-only (prod stays inert until a Jake-named flip).
RECORDER_INGEST_ENABLED = "1"
WHIP_ROOM_RECORDING = "1"
# #146 — a WHIP publisher only starts ICE/DTLS AFTER our 201, so its media flows seconds later than an RTK
# client's. Widen the container create-adapter retry budget (~14 attempts ≈ 12s) so the recorder rides out the
# WHIP publish→media-flow gap instead of exhausting the RTK-tuned default (7 ≈ 4.5s) before media arrives.
RT_ADAPTER_MAX_ATTEMPTS = "14"
# #146 — the SFU dials THIS base to push recorder media. The default is the PROD host (rt.wave.online), which
# would make the canary's SFU push media at the prod worker (foreign session/token -> create-adapter 503). Pin
# it to the canary's OWN workers.dev host so the SFU dials the SAME worker that signed the capability token.
RECORDER_PUBLIC_WSS = "wss://wave-realtime-edge-canary.jakefineman.workers.dev/v1/realtime/recorder"

# Canary recordings bucket — a DISTINCT bucket so canary recordings never mix with prod. Created in the deploy
# step (`wrangler r2 bucket create wave-realtime-recordings-canary`); --dry-run tolerates a not-yet-existing
# bucket. RT_RESIDENCY is unset, so RT_RECORDINGS_ENAM/EU are NOT needed (and not restated) on the canary.
[[env.canary.r2_buckets]]
binding = "RT_RECORDINGS"
bucket_name = "wave-realtime-recordings-canary"

# meetingId→org map — restated (same namespace id is fine; canary shares the lookup map).
[[env.canary.kv_namespaces]]
binding = "RT_MEETING_ORG"
id = "4acd6ec7b04546ba8767f2353d5394e8"

# ROOM DO — restated so the canary worker boots (room.ts RoomDO; migrations v1 inherited from top level).
[[env.canary.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

# RECORDER container DO — restated so `--env canary` resolves the container binding (migrations v2 inherited).
[[env.canary.containers]]
class_name = "RecorderContainer"
image = "./containers/rt-encoder/Dockerfile"
max_instances = 3

[[env.canary.durable_objects.bindings]]
name = "RECORDER"
class_name = "RecorderContainer"
